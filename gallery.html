<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Shani ❤️ - Memories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
        }
    </style>
</head>

<body class="text-white min-h-screen relative pb-20 overflow-x-hidden">
    <div id="particles-js" class="absolute inset-0 max-w-full z-[-1] fixed"></div>

    <div class="max-w-6xl mx-auto pt-16 px-4 z-10 relative">
        <h2
            class="text-4xl md:text-5xl text-center font-bold mb-14 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-red-500 glow-text animate-fade-in-down">
            මගෙ දිවියේ...මට ලබුනූ....වටිනාම තිලිනේ ඔයා... ✨
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <!-- image 1 -->
            <div class="glass-panel p-5 rounded-2xl transform hover:-translate-y-4 hover:rotate-2 transition duration-500 shadow-xl hover:shadow-pink-500/50 animate-fade-in-up"
                style="animation-delay: 0.2s;">
                <img src="images/couple.png" alt="Couple"
                    class="rounded-xl w-full h-72 object-cover shadow-inner mb-6 border border-pink-400/20">
                <p class="text-center text-pink-100 font-medium text-xl leading-relaxed">මගේ ජීවිතේ ලස්සනම හීනේ ඔයා
                    තමයි...</p>
            </div>

            <!-- image 2 -->
            <div class="glass-panel p-5 rounded-2xl transform hover:-translate-y-4 hover:-rotate-2 transition duration-500 shadow-xl hover:shadow-pink-500/50 animate-fade-in-up"
                style="animation-delay: 0.4s;">
                <img src="images/roses.png" alt="Roses"
                    class="rounded-xl w-full h-72 object-cover shadow-inner mb-6 border border-pink-400/20">
                <p class="text-center text-pink-100 font-medium text-xl leading-relaxed">හැමදාම සුවඳ දෙන හරි අමුතු
                    ආදරයක්...</p>
            </div>

            <!-- image 3 -->
            <div class="glass-panel p-5 rounded-2xl transform hover:-translate-y-4 hover:rotate-2 transition duration-500 shadow-xl hover:shadow-pink-500/50 animate-fade-in-up"
                style="animation-delay: 0.6s;">
                <img src="images/heart.png" alt="Heart"
                    class="rounded-xl w-full h-72 object-cover shadow-inner mb-6 border border-pink-400/20">
                <p class="text-center text-pink-100 font-medium text-xl leading-relaxed">මගේ හදවත හැමදාම ඔයාගේ ලඟමයි...
                </p>
            </div>
        </div>

        <div class="text-center mt-20 animate-fade-in-up" style="animation-delay: 0.8s;">
            <a href="message.html"
                class="inline-flex items-center justify-center px-10 py-5 text-xl font-bold text-white transition-all duration-300 bg-gradient-to-r from-red-500 to-pink-600 rounded-full hover:scale-110 shadow-xl hover:shadow-2xl shadow-red-500/50 pulse-btn border border-red-400/30">
                තව පොඩි දෙයක් තියෙනවා <i class="fas fa-heart ml-3 text-pink-200"></i>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
