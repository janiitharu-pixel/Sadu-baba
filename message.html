<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Shani ❤️ - My Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center relative overflow-hidden">
    <div id="particles-js" class="absolute inset-0 max-w-full"></div>
    
    <div class="z-10 glass-panel p-8 md:p-14 rounded-3xl max-w-3xl mx-4 text-center proposal-box shadow-2xl shadow-pink-500/30 border border-pink-400/40 relative">
        
        <i class="fas fa-heart text-7xl text-red-500 mb-8 heartbeat-icon drop-shadow-md block"></i>
        
        <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-pink-400 mb-8 leading-tight glow-text">
            මම ඔයාට ගොඩක් ආදරෙයි ෂානි! ❤️
        </h1>
        
        <div id="intro-msg">
            <p class="text-lg md:text-2xl text-gray-100 mb-10 leading-relaxed max-w-2xl mx-auto tracking-wide">
                ඔයා මගේ ජීවිතේට ආව දවසේ ඉඳන් මගේ මුළු ලෝකෙම ලස්සන වුණා. මගේ හුස්ම තියෙනකම්ම මම ඔයාට ආදරෙයි. මගේ හෙවනැල්ල වගේ හැමදාමත් මාත් එක්ක ඉන්න. සත්තයි මම ඔයාට පණටත් වඩා ආදරෙයි...
            </p>
            
            <p class="text-2xl font-bold text-pink-300 mb-8 animate-pulse">ඔයා මාව බඳින්න කැමතිද මැණික?</p>

            <div class="mt-8 flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-8">
                <button class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transform hover:scale-110 transition duration-300 yes-btn shadow-pink-500/50 text-xl md:text-2xl border border-pink-300/50" onclick="celebrate()">
                    මාත් ආදරෙයි! කැමතියි 💕
                </button>
                <button class="bg-gray-800/80 hover:bg-gray-700 text-gray-200 font-bold py-4 px-10 rounded-full shadow-lg transition duration-200 no-btn text-xl md:text-2xl border border-gray-600">
                    මට බෑ 😢
                </button>
            </div>
        </div>

        <div id="celebration-msg" class="hidden mt-6 text-3xl md:text-4xl text-pink-300 font-bold animate-bounce-in leading-relaxed glow-text">
            <p>මම දන්නවා මැණික ඔයා මට ආදරෙයි කියලා...! 😍</p>
            <p class="mt-4 text-2xl text-white">මං ආදරෙයි ගොඩාක්... 💞</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
