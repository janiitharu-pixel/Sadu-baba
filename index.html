<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Shani ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Container for floating hearts -->
    <div id="particles-js" class="absolute inset-0 max-w-full"></div>
    
    <!-- Main content box -->
    <div class="z-10 text-center glass-panel p-10 md:p-16 rounded-3xl mx-4 max-w-lg mt-12 animate-fade-in-up">
        
        <i class="fas fa-heart text-6xl text-pink-500 mb-6 heartbeat-icon block drop-shadow-md"></i>
        
        <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-red-500 mb-6 drop-shadow-lg p-2 glow-text">හායි ෂානි... ❤️</h1>
        
        <p class="text-xl md:text-2xl text-pink-100 mb-10 font-light leading-relaxed">
            මට ඔයාට කියන්න පොඩි දෙයක් තියෙනවා...
        </p>
        
        <a href="gallery.html" class="inline-flex items-center justify-center px-8 py-4 text-lg font-bold text-white transition-all duration-300 bg-gradient-to-r from-pink-500 to-red-600 rounded-full hover:from-pink-600 hover:to-red-700 hover:scale-110 shadow-xl hover:shadow-2xl shadow-pink-500/50 pulse-btn border border-pink-400/30">
            ඉස්සරහට යන්න <i class="fas fa-arrow-right ml-3"></i>
        </a>

    </div>

    <!-- Background Audio Setup (Optional) -->
    <!-- <audio autoplay loop src="love_song.mp3"></audio> -->

    <script src="script.js"></script>
</body>
</html>
